name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Validate markdown link style
        run: |
          set -euo pipefail
          violations="$(rg -n '\]\(/' --glob '*.md' . | rg -v '\]\(//' || true)"
          if [ -n "$violations" ]; then
            echo "Root-relative markdown links found. Use {{ site.baseurl }}/... instead:"
            echo "$violations"
            exit 1
          fi

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: andmoneyaps/docs
          JEKYLL_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate local image assets
        run: |
          set -euo pipefail

          mapfile -t image_srcs < <(
            rg -No '<img [^>]*src="[^"]+"' _site \
              | sed -E 's/.*src="([^"]+)".*/\1/' \
              | sed -E 's/[?#].*$//' \
              | sort -u
          )

          failures=0
          for src in "${image_srcs[@]}"; do
            case "$src" in
              http://*|https://*|data:*|//*) continue ;;
            esac

            if [[ -n "${BASE_PATH:-}" && "$src" == "${BASE_PATH}/"* ]]; then
              rel="${src#${BASE_PATH}/}"
            elif [[ "$src" == /* ]]; then
              rel="${src#/}"
            else
              rel="$src"
            fi

            case "$rel" in
              assets/*) ;;
              *) continue ;;
            esac

            if [[ ! -f "$rel" ]]; then
              echo "Missing image file: $src -> $rel"
              failures=1
              continue
            fi

            ext="${rel##*.}"
            ext="$(echo "$ext" | tr '[:upper:]' '[:lower:]')"
            mime="$(file --brief --mime-type "$rel")"

            case "$ext" in
              png) [[ "$mime" == "image/png" ]] || { echo "Invalid PNG: $rel (mime: $mime)"; failures=1; } ;;
              jpg|jpeg) [[ "$mime" == "image/jpeg" ]] || { echo "Invalid JPEG: $rel (mime: $mime)"; failures=1; } ;;
              gif) [[ "$mime" == "image/gif" ]] || { echo "Invalid GIF: $rel (mime: $mime)"; failures=1; } ;;
              webp) [[ "$mime" == "image/webp" ]] || { echo "Invalid WEBP: $rel (mime: $mime)"; failures=1; } ;;
              svg)
                case "$mime" in
                  image/svg+xml|text/plain|text/xml|application/xml) ;;
                  *) echo "Invalid SVG: $rel (mime: $mime)"; failures=1 ;;
                esac
                ;;
            esac
          done

          if [[ "$failures" -ne 0 ]]; then
            echo "Image asset validation failed."
            exit 1
          fi
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Validate links with HTMLProofer
        run: |
          bundle exec htmlproofer ./_site \
            --ignore-urls "/^http:\/\/localhost/,/^https:\/\/localhost/,/portal\.azure\.com.*GalleryItemDetailsBladeNopdl/,/apim-public-api.*\.azure-api\.net/" \
            --ignore-status-codes "403,429" \
            --no-enforce-https \
            --allow-missing-href \
            --swap-urls "^https\://andmoneyaps.github.io${BASE_PATH}/:/,^https\://github.com${BASE_PATH}/:/,^${BASE_PATH}/:/"
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
